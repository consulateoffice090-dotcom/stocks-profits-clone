<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stocks Profits - Sign In</title>
    <meta name="description" content="Access your Stocks Profits trading dashboard. Secure login to your trading account.">
    <meta property="og:title" content="Stocks Profits - Sign In" />
    <meta property="og:site_name" content="Stocks Profits" />
    <meta property="og:type" content="website" />

    <!-- Favicon -->
    <link href="https://stocks-profits.com/storage/app/public/photos/wHOPGaXg4rRyk9FvFMacIytQCzqlkQ2S5A79XIgk.png" rel="icon" type="image/x-icon" />

    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

    <style>
        body {
            overflow-x: hidden;
            font-family: 'Inter', sans-serif;
        }
        [x-cloak] {
            display: none !important;
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
    </style>

    <script type="module" src="/main.js"></script>
</head>

<body class="h-full bg-gray-900 font-sans antialiased text-gray-900">

    <!-- Main Content -->
    <div class="relative min-h-screen overflow-hidden py-8 sm:py-12 flex items-center justify-center">
        <div class="relative z-10 w-full max-w-lg px-4 sm:px-6">
            <!-- Login Card -->
            <div class="glass-effect rounded-2xl sm:rounded-3xl p-6 sm:p-8 lg:p-10 shadow-2xl">

                <!-- Header Section -->
                <div class="text-center mb-8">
                    <!-- Logo -->
                    <div class="flex items-center justify-center mb-6">
                        <img src="https://stocks-profits.com/storage/app/public/photos/FyibsoaDkdkNVvYYJKmGqdoe0D3KJ84mQNjoyJ0K.png"
                             class="h-16 w-auto"
                             alt="Stocks Profits" />
                    </div>

                    <!-- Title -->
                    <h1 class="text-2xl sm:text-3xl font-bold text-white mb-2">
                        Welcome Back
                    </h1>
                    <h2 class="text-lg sm:text-xl font-semibold mb-3">
                        <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-400">Stocks Profits</span>
                    </h2>
                    <p class="text-gray-300 text-sm sm:text-base">
                        Access your trading dashboard
                    </p>

                    <!-- Trading Stats -->
                    <div class="flex items-center justify-center gap-6 mt-6 text-xs sm:text-sm">
                        <div class="text-center">
                            <div class="flex items-center justify-center gap-1 text-green-400 mb-1">
                                <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
                                <span class="font-medium">Live</span>
                            </div>
                            <div class="text-gray-400">24/7 Markets</div>
                        </div>
                        <div class="w-px h-10 bg-white/20"></div>
                        <div class="text-center">
                            <div class="flex items-center justify-center gap-1 text-blue-400 mb-1">
                                <i data-lucide="zap" class="w-3 h-3"></i>
                                <span class="font-medium">Fast</span>
                            </div>
                            <div class="text-gray-400">Execution</div>
                        </div>
                        <div class="w-px h-10 bg-white/20"></div>
                        <div class="text-center">
                            <div class="flex items-center justify-center gap-1 text-cyan-400 mb-1">
                                <i data-lucide="shield" class="w-3 h-3"></i>
                                <span class="font-medium">Secure</span>
                            </div>
                            <div class="text-gray-400">Platform</div>
                        </div>
                    </div>
                </div>

                <!-- Login Form -->
                <form id="login-form" action="#" method="POST" class="space-y-6">
                    <!-- Email Field -->
                    <div class="space-y-2">
                        <label for="email" class="block text-sm font-semibold text-gray-200">
                            Email Address or Username
                        </label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 flex items-center pl-4">
                                <i data-lucide="mail" class="h-5 w-5 text-gray-400 group-focus-within:text-blue-400 transition-colors duration-200"></i>
                            </div>
                            <input type="text" name="email" id="email" required
                                   class="block w-full rounded-2xl border border-gray-600 bg-gray-900 pl-12 pr-4 py-4 text-white placeholder-gray-400 focus:border-blue-400 focus:ring-2 focus:ring-blue-400/20 focus:bg-gray-800 transition-all duration-200 text-sm font-medium"
                                   placeholder="your.email@example.com">
                        </div>
                    </div>

                    <!-- Password Field -->
                    <div class="space-y-2">
                        <label for="password" class="block text-sm font-semibold text-gray-200">
                            Password
                        </label>
                        <div class="relative group" x-data="{ showPassword: false }">
                            <div class="absolute inset-y-0 left-0 flex items-center pl-4">
                                <i data-lucide="lock" class="h-5 w-5 text-gray-400 group-focus-within:text-blue-400 transition-colors duration-200"></i>
                            </div>
                            <input :type="showPassword ? 'text' : 'password'" name="password" id="password" required
                                   class="block w-full rounded-2xl border border-gray-600 bg-gray-900 pl-12 pr-12 py-4 text-white placeholder-gray-400 focus:border-blue-400 focus:ring-2 focus:ring-blue-400/20 focus:bg-gray-800 transition-all duration-200 text-sm font-medium"
                                   placeholder="Enter your password">
                            <button type="button" @click="showPassword = !showPassword"
                                    class="absolute inset-y-0 right-0 flex items-center pr-4 text-gray-400 hover:text-blue-400 transition-colors">
                                <svg x-show="!showPassword" class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                                <svg x-show="showPassword" x-cloak class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18"/></svg>
                            </button>
                        </div>
                    </div>

                    <!-- Remember Me & Forgot Password -->
                    <div class="flex items-center justify-between text-sm">
                        <div class="flex items-center">
                            <input type="checkbox" name="remember" id="remember"
                                   class="h-4 w-4 rounded border-gray-600 bg-gray-900 text-blue-500 focus:ring-2 focus:ring-blue-400/20 transition-colors">
                            <label for="remember" class="ml-3 text-gray-300 font-medium">
                                Remember me
                            </label>
                        </div>
                        <a href="#" class="text-blue-400 hover:text-blue-300 transition-colors underline underline-offset-2">
                            Forgot password?
                        </a>
                    </div>

                    <!-- Login Button -->
                    <div class="mt-8">
                        <button type="submit"
                                class="group relative flex w-full justify-center items-center gap-3 rounded-2xl bg-gradient-to-r from-blue-500 to-cyan-500 hover:from-blue-600 hover:to-cyan-600 px-6 py-4 text-base font-bold text-white transition-all duration-200 shadow-lg hover:shadow-xl transform hover:-translate-y-0.5 focus:outline-none focus:ring-2 focus:ring-blue-400/50">
                            <i data-lucide="log-in" class="h-5 w-5"></i>
                            <span>Access Dashboard</span>
                            <svg class="h-4 w-4 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                        </button>
                    </div>
                </form>

                <!-- Biometric Quick Access -->
                <div class="mt-8">
                    <div class="relative">
                        <div class="absolute inset-0 flex items-center">
                            <div class="w-full border-t border-white/20"></div>
                        </div>
                        <div class="relative flex justify-center text-sm">
                            <span class="bg-gray-900 px-4 text-gray-300 font-medium">Quick Access</span>
                        </div>
                    </div>

                    <div class="mt-6 flex justify-center space-x-4">
                        <button type="button" class="group relative inline-flex items-center justify-center w-14 h-14 rounded-2xl border border-gray-600 bg-gray-800 hover:bg-gray-700 hover:border-blue-400/50 transition-all duration-200 shadow-lg hover:shadow-xl">
                            <i data-lucide="fingerprint" class="h-6 w-6 text-blue-400 group-hover:text-blue-300 group-hover:scale-110 transition-all duration-200"></i>
                        </button>
                        <button type="button" class="group relative inline-flex items-center justify-center w-14 h-14 rounded-2xl border border-gray-600 bg-gray-800 hover:bg-gray-700 hover:border-cyan-400/50 transition-all duration-200 shadow-lg hover:shadow-xl">
                            <i data-lucide="scan-face" class="h-6 w-6 text-cyan-400 group-hover:text-cyan-300 group-hover:scale-110 transition-all duration-200"></i>
                        </button>
                        <button type="button" class="group relative inline-flex items-center justify-center w-14 h-14 rounded-2xl border border-gray-600 bg-gray-800 hover:bg-gray-700 hover:border-green-400/50 transition-all duration-200 shadow-lg hover:shadow-xl">
                            <i data-lucide="qr-code" class="h-6 w-6 text-green-400 group-hover:text-green-300 group-hover:scale-110 transition-all duration-200"></i>
                        </button>
                    </div>
                </div>

                <!-- Footer -->
                <div class="mt-10 text-center space-y-6">
                    <div class="text-sm">
                        <span class="text-gray-300">New to trading? </span>
                        <a href="/pages/register.html"
                           class="font-semibold text-blue-400 hover:text-blue-300 transition-colors underline underline-offset-2">
                            Create your account
                        </a>
                    </div>

                    <!-- Security Badges -->
                    <div class="flex items-center justify-center gap-6 py-4 text-xs text-gray-400">
                        <div class="flex items-center gap-1">
                            <i data-lucide="shield-check" class="w-3 h-3 text-green-400"></i>
                            <span>SSL Secured</span>
                        </div>
                        <div class="flex items-center gap-1">
                            <i data-lucide="lock" class="w-3 h-3 text-blue-400"></i>
                            <span>256-bit Encryption</span>
                        </div>
                        <div class="flex items-center gap-1">
                            <i data-lucide="award" class="w-3 h-3 text-cyan-400"></i>
                            <span>Regulated</span>
                        </div>
                    </div>

                    <!-- Copyright -->
                    <p class="text-xs text-gray-500">
                        &copy; 2026 Stocks Profits. All rights reserved.
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Auto-focus email field
            const emailField = document.getElementById('email');
            if (emailField) {
                emailField.focus();
            }

            // Initialize Lucide icons
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        });
    </script>
</body>
</html>
